<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SpeakEasy A Voice Translator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <h1>🎤 SpeakEasy smart voice translation</h1>
    <p class="subtitle">Speak in your language, translate in real-time</p>

    <div class="card">

        <!-- User Info -->
        <div class="row">
            <input type="text" placeholder="👤 Your Name">
            <input type="text" placeholder="📍 Location">
        </div>

        <!-- Language -->
        <div class="row">
            <select id="language">
                <option value="hi">Hindi</option>
                <option value="te">Telugu</option>
                <option value="en">English</option>
            </select>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button onclick="startListening()">🎙 Speak</button>
            <button onclick="translateText()">🔄 Translate</button>
            <button onclick="speak()">🔊 Listen</button>
        </div>

        <!-- Output -->
        <div class="output">
            <p><b>Input:</b> <span id="inputText">---</span></p>
            <p><b>Output:</b> <span id="translatedText">---</span></p>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
