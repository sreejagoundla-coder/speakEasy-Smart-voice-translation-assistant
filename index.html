<!DOCTYPE html>
<html lang="en">
<head>
    <title>SpeakEasy</title>
</head>
<body>

    <h2>🎤 SpeakEasy - Voice & Text Translator</h2>

    <!-- Voice Button -->
    <button onclick="startListening()">🎤 Speak</button>

    <!-- Text Mode -->
    <h3>OR Enter Text</h3>
    <textarea id="textInput" placeholder="Type here..."></textarea><br><br>
    <button onclick="handleTextInput()">Translate Text</button>

    <br><br>

    <!-- Language Selection -->
    <select id="language">
        <option value="hi-IN">Hindi</option>
        <option value="te-IN">Telugu</option>
        <option value="ta-IN">Tamil</option>
        <option value="fr-FR">French</option>
    </select>

    <br><br>

    <!-- Output -->
    <h3>Input:</h3>
    <p id="inputText"></p>

    <h3>Translated:</h3>
    <p id="translatedText"></p>

    <br>

    <button onclick="speak()">🔊 Speak Output</button>

    <!-- JS START -->
    <script>
        let recognizedText = "";
        let translatedTextGlobal = "";

        // 🎤 Voice Input
        function startListening() {
            const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = "en-IN";

            recognition.start();

            recognition.onresult = function(event) {
                recognizedText = event.results[0][0].transcript;

                document.getElementById("inputText").innerText = recognizedText;

                // Auto translate voice
                translateText(recognizedText);
            };
        }

        // ⌨️ Text Input Handler
        function handleTextInput() {
            let text = document.getElementById("textInput").value;

            if (text.trim() === "") {
                alert("Please enter some text bro");
                return;
            }

            document.getElementById("inputText").innerText = text;

            translateText(text);
        }

        // 🌐 Translation Function (COMMON for both)
        function translateText(inputText) {
            let targetLang = document.getElementById("language").value;

            let url = `https://api.mymemory.translated.net/get?q=${inputText}&langpair=en|${targetLang}`;

            fetch(url)
            .then(res => res.json())
            .then(data => {
                translatedTextGlobal = data.responseData.translatedText;

                document.getElementById("translatedText").innerText = translatedTextGlobal;
            })
            .catch(err => {
                alert("Translation error");
                console.log(err);
            });
        }

        // 🔊 Speak Output
        function speak() {
            if (!translatedTextGlobal) {
                alert("Nothing to speak");
                return;
            }

            let speech = new SpeechSynthesisUtterance(translatedTextGlobal);
            speech.lang = document.getElementById("language").value;

            window.speechSynthesis.speak(speech);
        }
    </script>

</body>
</html>
