<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SpeakEasy - Voice Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🎤 SpeakEasy</h1>
    <p class="tagline">Speak • Translate • Communicate</p>

    <!-- User Info -->
    <div class="user-info">
        <input type="text" id="username" placeholder="Enter your name">
        <input type="text" id="location" placeholder="Enter your location">
    </div>

    <!-- Language Selection -->
    <div class="section">
        <label>Select Language:</label>
        <select id="language">
            <option value="hi">Hindi</option>
            <option value="te">Telugu</option>
            <option value="en">English</option>
        </select>
    </div>

    <!-- Voice Input -->
    <div class="section">
        <label>Voice Input:</label>
        <button onclick="startListening()">🎙️ Speak</button>
        <p id="inputText">Your speech will appear here...</p>
    </div>

    <!-- Translation -->
    <div class="section">
        <label>Translated Text:</label>
        <button onclick="translateText()">🔄 Translate</button>
        <p id="translatedText">Translated output will appear here...</p>
    </div>

    <!-- Voice Output -->
    <div class="section">
        <label>Listen Output:</label>
        <button onclick="speak()">🔊 Listen</button>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
